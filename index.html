<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>온라인 프로토타입 — 1단계 연결</title>
<style>
  :root{--bg:#0D1120;--panel:#151B32;--line:#F2EDE4;--accent:#FF2E88;--ok:#8BE9A8;--warn:#FFC93C;--p1:#FF5A5A;--p2:#5ABCFF}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--line);font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px;gap:14px}
  h1{font-size:22px;letter-spacing:2px}
  h1 b{color:var(--accent)}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:center}
  .panel{background:var(--panel);border:1px solid #2A3354;border-radius:12px;padding:16px;width:min(92vw,720px)}
  button{background:var(--accent);color:#fff;border:0;border-radius:8px;padding:10px 18px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
  button.ghost{background:transparent;box-shadow:inset 0 0 0 2px var(--line);color:var(--line)}
  button:disabled{opacity:.35;cursor:default}
  input{background:#0A0E1C;border:1px solid #2A3354;color:var(--line);border-radius:8px;padding:10px 12px;font-size:16px;width:120px;text-align:center;letter-spacing:4px;font-family:monospace;text-transform:uppercase}
  #code{font-size:28px;letter-spacing:8px;color:var(--warn);font-family:monospace;font-weight:800}
  #stats{display:flex;gap:18px;font-family:monospace;font-size:14px;flex-wrap:wrap}
  #stats b{color:var(--ok)}
  #log{height:180px;overflow-y:auto;font-family:monospace;font-size:12px;line-height:1.7;color:#AAB3D0;background:#0A0E1C;border-radius:8px;padding:10px}
  #log .ok{color:var(--ok)} #log .err{color:#FF7A7A} #log .sig{color:var(--warn)}
  canvas{background:#0A0E1C;border-radius:12px;border:1px solid #2A3354;display:block}
  .hint{font-size:12px;color:#8B93B4}
</style>
</head>
<body>
<h1>1 ON 1 <b>온라인 프로토타입</b> — 1단계: 연결·지연 측정</h1>

<div class="panel">
  <div class="row" id="lobby">
    <button id="btnHost">방 만들기</button>
    <span style="color:#8B93B4">또는</span>
    <input id="inCode" maxlength="4" placeholder="CODE">
    <button id="btnJoin" class="ghost">참가</button>
    <span id="code"></span>
  </div>
</div>

<div class="panel">
  <div id="stats">
    <span>상태 <b id="stConn">대기</b></span>
    <span>경로 <b id="stPath">-</b></span>
    <span>RTT <b id="stRtt">-</b></span>
    <span>평균 <b id="stAvg">-</b></span>
    <span>최소 <b id="stMin">-</b></span>
    <span>수신 <b id="stRecv">0</b></span>
  </div>
</div>

<canvas id="cv" width="720" height="240"></canvas>
<div class="hint">연결되면 <b>A/D 또는 ←/→</b>로 자기 네모 이동 — 상대 화면에 실시간 반영됩니다. 자기 입력은 로컬 즉시 반영(0프레임), 상대는 DataChannel 수신.</div>

<div class="panel"><div id="log"></div></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
/* ================= 설정 ================= */
const SUPABASE_URL='https://jbetmfiantxekhfzbrld.supabase.co';
const SUPABASE_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpiZXRtZmlhbnR4ZWtoZnpicmxkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2NjI5MjAsImV4cCI6MjA5OTIzODkyMH0.6Dp2lyVzauQ1OzklvMoLOAF092FqpNbC_7OBdk_XSFo';
const ICE={iceServers:[
  {urls:'stun:stun.l.google.com:19302'},
  {urls:'stun:stun1.l.google.com:19302'}
]}; // STUN 전용 (무료·직결만). 대칭 NAT 조합은 연결 실패 처리.

const sb=supabase.createClient(SUPABASE_URL,SUPABASE_ANON);
const $=id=>document.getElementById(id);
function log(msg,cls){ const d=document.createElement('div'); if(cls)d.className=cls; d.textContent=`[${new Date().toLocaleTimeString('ko-KR',{hour12:false})}] ${msg}`; $('log').appendChild(d); $('log').scrollTop=1e9; }

/* ================= 시그널링 (Supabase Broadcast) ================= */
let chan=null, pc=null, dc=null, isHost=false, roomCode='';

function makeCode(){ const s='ABCDEFGHJKMNPQRSTUVWXYZ23456789'; let c=''; for(let i=0;i<4;i++)c+=s[Math.floor(Math.random()*s.length)]; return c; }

async function openChannel(code){
  roomCode=code;
  chan=sb.channel('room-'+code,{config:{broadcast:{self:false}}});
  chan.on('broadcast',{event:'sig'},({payload})=>onSignal(payload));
  await new Promise((res,rej)=>{
    chan.subscribe(st=>{ if(st==='SUBSCRIBED')res(); if(st==='CHANNEL_ERROR'||st==='TIMED_OUT')rej(new Error(st)); });
  });
  log('시그널링 채널 접속: room-'+code,'sig');
}
function sendSig(payload){ chan.send({type:'broadcast',event:'sig',payload}); }

async function host(){
  isHost=true;
  const code=makeCode();
  $('code').textContent=code;
  $('btnHost').disabled=$('btnJoin').disabled=true;
  try{ await openChannel(code); }catch(e){ log('채널 접속 실패: '+e.message,'err'); return; }
  log('상대 참가 대기 중... 코드를 상대에게 전달하세요.');
}
async function join(){
  isHost=false;
  const code=$('inCode').value.trim().toUpperCase();
  if(code.length!==4){ log('4자리 코드를 입력하세요.','err'); return; }
  $('code').textContent=code;
  $('btnHost').disabled=$('btnJoin').disabled=true;
  try{ await openChannel(code); }catch(e){ log('채널 접속 실패: '+e.message,'err'); return; }
  sendSig({type:'join'});
  log('참가 신호 전송. 호스트의 offer 대기...');
}

function newPC(){
  pc=new RTCPeerConnection(ICE);
  pc.onicecandidate=e=>{ if(e.candidate)sendSig({type:'ice',cand:e.candidate.toJSON()}); };
  pc.oniceconnectionstatechange=()=>{
    log('ICE 상태: '+pc.iceConnectionState, pc.iceConnectionState==='connected'?'ok':undefined);
    $('stConn').textContent=pc.iceConnectionState;
    if(pc.iceConnectionState==='connected')reportPath();
    if(pc.iceConnectionState==='failed')log('직결 실패 — 이 네트워크 조합은 STUN으로 뚫리지 않습니다(대칭 NAT 가능성). 다른 네트워크에서 재시도하세요.','err');
  };
  return pc;
}
async function reportPath(){
  try{
    const stats=await pc.getStats();
    let pair=null, cands={};
    stats.forEach(r=>{ if(r.type==='local-candidate'||r.type==='remote-candidate')cands[r.id]=r;
                       if(r.type==='candidate-pair'&&r.state==='succeeded'&&r.nominated)pair=r; });
    if(pair){
      const l=cands[pair.localCandidateId], r=cands[pair.remoteCandidateId];
      const t=(l&&l.candidateType||'?')+'↔'+(r&&r.candidateType||'?');
      $('stPath').textContent=t;
      log(`선택 경로: ${t} (host=같은망 직결, srflx=STUN 직결)`,'ok');
    }
  }catch(e){}
}

async function onSignal(m){
  if(m.type==='join'&&isHost){
    log('상대 참가 감지 → offer 생성','sig');
    newPC();
    dc=pc.createDataChannel('game',{ordered:false,maxRetransmits:0});
    wireDC();
    const offer=await pc.createOffer();
    await pc.setLocalDescription(offer);
    sendSig({type:'offer',sdp:pc.localDescription});
  }
  else if(m.type==='offer'&&!isHost){
    log('offer 수신 → answer 생성','sig');
    newPC();
    pc.ondatachannel=e=>{ dc=e.channel; wireDC(); };
    await pc.setRemoteDescription(m.sdp);
    const ans=await pc.createAnswer();
    await pc.setLocalDescription(ans);
    sendSig({type:'answer',sdp:pc.localDescription});
  }
  else if(m.type==='answer'&&isHost){
    log('answer 수신','sig');
    await pc.setRemoteDescription(m.sdp);
  }
  else if(m.type==='ice'&&pc){
    try{ await pc.addIceCandidate(m.cand); }catch(e){ log('ICE 추가 실패: '+e.message,'err'); }
  }
}

/* ================= DataChannel: 핑 + 입력 ================= */
let rtts=[], recvCount=0, pingTimer=null;
function wireDC(){
  dc.onopen=()=>{
    log('DataChannel 열림 — 게임 데이터는 이제 P2P 직행','ok');
    me.x=isHost?180:540; remote.x=isHost?540:180;
    $('stConn').textContent='P2P 연결됨';
    chan.unsubscribe(); log('시그널링 채널 해제 (Supabase 역할 종료)','sig');
    pingTimer=setInterval(()=>{ if(dc.readyState==='open')dc.send(JSON.stringify({t:'ping',ts:performance.now()})); },500);
  };
  dc.onclose=()=>{ log('DataChannel 닫힘','err'); $('stConn').textContent='끊김'; clearInterval(pingTimer); };
  dc.onmessage=e=>{
    recvCount++; $('stRecv').textContent=recvCount;
    const m=JSON.parse(e.data);
    if(m.t==='ping'){ dc.send(JSON.stringify({t:'pong',ts:m.ts})); }
    else if(m.t==='pong'){
      const rtt=performance.now()-m.ts;
      rtts.push(rtt); if(rtts.length>40)rtts.shift();
      $('stRtt').textContent=rtt.toFixed(1)+'ms';
      $('stAvg').textContent=(rtts.reduce((a,b)=>a+b,0)/rtts.length).toFixed(1)+'ms';
      $('stMin').textContent=Math.min(...rtts).toFixed(1)+'ms';
    }
    else if(m.t==='inp'){ remote.L=m.L; remote.R=m.R; }
  };
}

/* ================= 입력 교환 데모 (네모 2개) ================= */
const cv=$('cv'), ctx=cv.getContext('2d');
const me={x:180,L:false,R:false}, remote={x:540,L:false,R:false};
addEventListener('keydown',e=>{ if(setKey(e.code,true))sendInp(); });
addEventListener('keyup',e=>{ if(setKey(e.code,false))sendInp(); });
function setKey(code,v){
  let hit=false;
  if(code==='KeyA'||code==='ArrowLeft'){ if(me.L!==v){me.L=v;hit=true;} }
  if(code==='KeyD'||code==='ArrowRight'){ if(me.R!==v){me.R=v;hit=true;} }
  return hit;
}
function sendInp(){ if(dc&&dc.readyState==='open')dc.send(JSON.stringify({t:'inp',L:me.L,R:me.R})); }

function loop(){
  const SP=4.5;
  me.x+=(me.R-me.L)*SP; me.x=Math.max(24,Math.min(cv.width-24,me.x));
  remote.x+=(remote.R-remote.L)*SP; remote.x=Math.max(24,Math.min(cv.width-24,remote.x));
  ctx.fillStyle='#0A0E1C'; ctx.fillRect(0,0,cv.width,cv.height);
  ctx.fillStyle='#2A3354'; ctx.fillRect(0,200,cv.width,4);
  // 나(즉시 반영) / 상대(수신 반영)
  ctx.fillStyle=isHost?'#FF5A5A':'#5ABCFF';
  ctx.fillRect(me.x-20,156,40,44);
  ctx.fillStyle=isHost?'#5ABCFF':'#FF5A5A';
  ctx.fillRect(remote.x-20,156,40,44);
  ctx.fillStyle='#F2EDE4'; ctx.font='700 12px monospace'; ctx.textAlign='center';
  ctx.fillText('ME',me.x,148); ctx.fillText('PEER',remote.x,148);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

$('btnHost').onclick=host;
$('btnJoin').onclick=join;
log('준비 완료. 한쪽은 [방 만들기], 다른 쪽은 코드 입력 후 [참가].');
log('테스트 순서: 같은 PC 탭 2개 → 같은 공유기 기기 2대 → 서로 다른 네트워크 순으로 확인 권장.');
</script>
</body>
</html>
